<section class="team section" id="team">
  <div class="container">
    <div class="section-header fade-up">
      <div class="accent-rule"></div>
      <span class="section-label">OUR TEAM</span>
      <h2 class="h2-section">Expertise Across Decades and Disciplines</h2>
      <p class="team__subhead subhead">Our consultants bring multi-decade experience from IITs, IIMs, Fortune 100 MNCs, global banks, and government bodies.</p>
    </div>

    <div class="team__carousel-wrap">

      <button class="team__arrow" #prevBtn aria-label="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="swiper team__swiper" #swiperEl>
        <div class="swiper-wrapper">
          <div class="swiper-slide" *ngFor="let member of members">
            <div class="team__card">
              <div class="team__avatar">{{ member.initials }}</div>
              <div class="team__info">
                <h3 class="team__name">{{ member.name }}</h3>
                <p class="team__title">{{ member.title }}</p>
                <ul class="team__credentials">
                  <li *ngFor="let cred of member.credentials">{{ cred }}</li>
                </ul>
                <a href="#" class="team__linkedin" aria-label="LinkedIn profile">
                  <!-- TODO: Add LinkedIn URL -->
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="20" height="20" rx="4" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M7 10v7M7 7v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M11 17v-4a3 3 0 016 0v4M11 10v7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="swiper-pagination team__pagination"></div>
      </div>

      <button class="team__arrow" #nextBtn aria-label="Next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>
  </div>
</section>
