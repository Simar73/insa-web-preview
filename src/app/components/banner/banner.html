<div class="banner" *ngIf="isVisible">
  <div class="container banner__inner">
    <div class="banner__content">
      <span class="banner__icon">🚧</span>
      <div>
        <strong class="banner__title">NEW WEBSITE UNDER CONSTRUCTION</strong>
        <p class="banner__text">
          We are developing a new digital experience to better showcase how we empower enterprises with intelligent data-driven solutions and expert AI strategy. Our new platform is on its way.
        </p>
      </div>
    </div>
    <button class="banner__close" (click)="dismiss()" aria-label="Dismiss announcement">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>
